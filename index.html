<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Il Post – Feed filtrato</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 620px; margin: 4rem auto; padding: 0 1.5rem; color: #222; line-height: 1.6; }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    code { background: #f3f3f3; padding: 0.2em 0.5em; border-radius: 4px; font-size: 0.9rem; word-break: break-all; }
    a { color: #01696f; }
    .box { border: 1px solid #ddd; border-radius: 8px; padding: 1rem 1.25rem; margin: 1.5rem 0; background: #f9f9f9; }
  </style>
</head>
<body>
  <h1>Il Post – Feed filtrato</h1>
  <p>Feed RSS personalizzato de <a href="https://www.ilpost.it" target="_blank">Il Post</a>,
     aggiornato automaticamente ogni 30 minuti via GitHub Actions.</p>
  <div class="box">
    <strong>URL del tuo feed:</strong><br><br>
    <code id="url">...</code><br><br>
    <a href="./feed.xml">📄 Apri feed.xml direttamente</a>
  </div>
  <p>Aggiungi l'URL sopra al tuo reader RSS (Reeder, NetNewsWire, Feedly, ecc.).</p>
  <script>
    const base = window.location.origin + window.location.pathname.replace(/\/index\.html$/, "").replace(/\/$/, "");
    document.getElementById("url").textContent = base + "/feed.xml";
  </script>
</body>
</html>
